// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

// bootscreen.jsx — Arcade-style intro that takes over the full viewport on

(function() {
  const { useState, useEffect } = React;

  function BootScreen({ accent, onDismiss }) {
    const [state, setState] = useState("on");   // 'on' | 'wiping' | 'gone'
    const [blink, setBlink] = useState(true);
    const [glitch, setGlitch] = useState(false);

    // PRESS START blink loop
    useEffect(() => {
      if (state !== "on") return;
      const t = setInterval(() => setBlink((b) => !b), 520);
      return () => clearInterval(t);
    }, [state]);

    // Periodic micro-glitch on the screen text — makes it feel alive
    useEffect(() => {
      if (state !== "on") return;
      const tick = () => {
        setGlitch(true);
        setTimeout(() => setGlitch(false), 90);
      };
      const t = setInterval(tick, 3200);
      return () => clearInterval(t);
    }, [state]);

    function start() {
      if (state !== "on") return;
      setState("wiping");
      setTimeout(() => {
        setState("gone");
        onDismiss && onDismiss();
        try { localStorage.setItem("scc.bootSeen", "1"); } catch (e) {}
      }, 850);

    // Keyboard: Enter / Space / Escape all start

          start();

        {/* "SAIF.EXE" marquee */}
        <div style={{ position: "relative", textAlign: "center" }}>
          <div style={{

            textShadow: `0 0 18px ${accent}aa, 0 0 38px ${accent}55, 0 0 80px ${accent}33`,
            transform: glitch ? "skewX(-4deg)" : "skewX(0deg)",

                position: "absolute", inset: 0, color: "#ff4a4a",

                transform: "translate(2px, 0)",
                pointerEvents: "none",
              }}>SAIF<span style={{ opacity: 0.6 }}>.</span>EXE</span>
            )}
          </div>
          <div style={{
            marginTop: 12,
            fontFamily: "'JetBrains Mono', ui-monospace, monospace",

            letterSpacing: "0.32em",
            color: "rgba(255,255,255,.5)",
          }}>
            UNITY · GAMEPLAY · MULTIPLAYER · UI
          </div>
        </div>

        {/* PRESS START */}
        <div style={{

          fontFamily: "'JetBrains Mono', ui-monospace, monospace",

  <!-- ── minimax.jsx ── -->
  <script type="text/babel">
// minimax.jsx — Playable Ultimate Tic-Tac-Toe demo with Minimax + α-β pruning.
//
// Ultimate XO is 9 mini 3×3 boards arranged in a 3×3 meta-grid. Your move
// inside a mini-board determines which mini-board your opponent must play in
// next. Win a mini-board to claim that meta-cell; win 3 meta-cells in a row
// to win the game. If sent to a board that's already won or full, the
// opponent may play in any open board.
//
// Game tree is too large for perfect play (~10^40 states), so the AI uses
// limited-depth minimax with α-β pruning and a heuristic eval.

(function() {
  const { useState, useEffect } = React;

  // ─── Game logic ──────────────────────────────────────────────────────────

  const LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6],
  ];

  function checkWinner(b) {
    for (const [a, c, d] of LINES) {
      if (b[a] && b[a] !== "D" && b[a] === b[c] && b[a] === b[d]) {
        return { who: b[a], line: [a, c, d] };
      }
    }
    return null;
  }

  function isFull(b) { return b.every(Boolean); }

  function initialState() {
    return {
      mini: Array.from({ length: 9 }, () => Array(9).fill(null)),
      meta: Array(9).fill(null),          // 'X' | 'O' | 'D' | null
      active: null,                        // 0..8 or null = play anywhere
      turn: "X",                           // 'X' = player, 'O' = AI
    };
  }

  function legalMoves(s) {
    const moves = [];
    const canPlayBoard = (b) =>
      s.meta[b] === null && !isFull(s.mini[b]);

    if (s.active !== null && canPlayBoard(s.active)) {
      for (let c = 0; c < 9; c++) {
        if (s.mini[s.active][c] === null) moves.push([s.active, c]);
      }
    } else {
      for (let b = 0; b < 9; b++) {
        if (!canPlayBoard(b)) continue;
        for (let c = 0; c < 9; c++) {
          if (s.mini[b][c] === null) moves.push([b, c]);
        }
      }
    }
    return moves;
  }

  function applyMove(s, [b, c]) {
    // Mutating clone — caller owns the result.
    const mini = s.mini.map((mb) => mb.slice());
    mini[b][c] = s.turn;
    const meta = s.meta.slice();
    if (meta[b] === null) {
      const w = checkWinner(mini[b]);
      if (w) meta[b] = w.who;
      else if (isFull(mini[b])) meta[b] = "D";
    }
    const nextBoard = c;
    const active =
      meta[nextBoard] !== null || isFull(mini[nextBoard]) ? null : nextBoard;
    return {
      mini, meta, active,
      turn: s.turn === "X" ? "O" : "X",
    };
  }

  // Heuristic eval: score from AI ('O') perspective.
  // Big rewards for meta-board control + threats; small rewards for tactical
  // position inside not-yet-won mini-boards.
  const POSITION_WEIGHT = [3, 2, 3, 2, 4, 2, 3, 2, 3];

  function lineScore(cells, friend, foe) {
    let f = 0, e = 0;
    for (const v of cells) {
      if (v === friend) f++;
      else if (v === foe) e++;
    }
    if (f > 0 && e === 0) return f === 3 ? 1000 : (f === 2 ? 12 : 1);
    if (e > 0 && f === 0) return -(e === 3 ? 1000 : (e === 2 ? 12 : 1));
    return 0;
  }

  function evaluate(s) {
    // Meta lines — strongest signal.
    const metaForLines = s.meta.map((v) => (v === "D" ? null : v));
    const metaWin = checkWinner(metaForLines);
    if (metaWin) return metaWin.who === "O" ? 100000 : -100000;

    let score = 0;
    // Meta position control
    for (let i = 0; i < 9; i++) {
      if (metaForLines[i] === "O") score += POSITION_WEIGHT[i] * 30;
      else if (metaForLines[i] === "X") score -= POSITION_WEIGHT[i] * 30;
    }
    // Meta-line threats
    for (const [a, b, c] of LINES) {
      score += lineScore([metaForLines[a], metaForLines[b], metaForLines[c]], "O", "X") * 4;
    }
    // Per-mini tactical
    for (let b = 0; b < 9; b++) {
      if (s.meta[b] !== null) continue;
      const m = s.mini[b];
      if (m[4] === "O") score += 2;
      else if (m[4] === "X") score -= 2;
      for (const [a, c, d] of LINES) {
        score += lineScore([m[a], m[c], m[d]], "O", "X");
      }
    }
    return score;
  }

  function minimaxStep(s, depth, alpha, beta, nodes) {
    nodes.count++;
    const metaForLines = s.meta.map((v) => (v === "D" ? null : v));
    const metaWin = checkWinner(metaForLines);
    if (metaWin) {
      return { score: metaWin.who === "O" ? 100000 + depth : -100000 - depth, move: null };
    }
    if (depth === 0) return { score: evaluate(s), move: null };

    const moves = legalMoves(s);
    if (moves.length === 0) return { score: evaluate(s), move: null };

    // Cheap move ordering: prefer center positions.
    moves.sort((a, b) =>
      (POSITION_WEIGHT[b[1]] + POSITION_WEIGHT[b[0]]) -
      (POSITION_WEIGHT[a[1]] + POSITION_WEIGHT[a[0]])
    );

    if (s.turn === "O") {
      let best = { score: -Infinity, move: moves[0] };
      for (const mv of moves) {
        const r = minimaxStep(applyMove(s, mv), depth - 1, alpha, beta, nodes);
        if (r.score > best.score) best = { score: r.score, move: mv };
        if (r.score > alpha) alpha = r.score;
        if (beta <= alpha) break;
      }
      return best;
    } else {
      let best = { score: Infinity, move: moves[0] };
      for (const mv of moves) {
        const r = minimaxStep(applyMove(s, mv), depth - 1, alpha, beta, nodes);
        if (r.score < best.score) best = { score: r.score, move: mv };
        if (r.score < beta) beta = r.score;
        if (beta <= alpha) break;
      }
      return best;
    }
  }

  function bestMove(state, depth = 4) {
    const nodes = { count: 0 };
    const t0 = performance.now();
    const r = minimaxStep(state, depth, -Infinity, Infinity, nodes);
    const ms = performance.now() - t0;
    return { ...r, nodes: nodes.count, ms };
  }

  // ─── Sub-components ──────────────────────────────────────────────────────

  function MiniBoard({ idx, mini, winner, theme, accent, isActive, canPlay, onCell, hoveredOverride, lastMove }) {
    // winner: null | 'X' | 'O' | 'D'

                onMouseLeave={(e) => { if (!disabled) e.currentTarget.style.background = theme.panel; }}>
                {cell || ""}
              </button>

          })}
        </div>
        {/* Win overlay */}
        {winner && (
          <div style={{
            position: "absolute", inset: 4,
            display: "flex", alignItems: "center", justifyContent: "center",
            pointerEvents: "none",
            fontSize: "clamp(36px, 6vw, 64px)",

  // ─── Top-level component ─────────────────────────────────────────────────

  function MinimaxDemo({ theme, accent }) {
    const [state, setState] = useState(initialState);
    const [thinking, setThinking] = useState(false);
    const [stats, setStats] = useState({ nodes: 0, score: 0, ms: 0 });
    const [history, setHistory] = useState([]);

    const metaForLines = state.meta.map((v) => (v === "D" ? null : v));

      !!metaWin ||
      state.meta.every((m) => m !== null) ||
      legalMoves(state).length === 0;

    const lastMove = history.length ? history[history.length - 1].move : null;

    // AI turn
    useEffect(() => {
      if (state.turn !== "O" || gameOver) return;
      setThinking(true);
      const t = setTimeout(() => {
        const r = bestMove(state, 4);
        if (r.move) {
          setState((cur) => applyMove(cur, r.move));
          setHistory((h) => [
            ...h,
            { who: "O", move: r.move, nodes: r.nodes, ms: r.ms, score: r.score },
          ]);
          setStats({ nodes: r.nodes, score: r.score, ms: Math.max(0.1, r.ms) });
        }
        setThinking(false);
      }, 380);
      return () => clearTimeout(t);
    }, [state, gameOver]);

    function play(b, c) {
      if (gameOver || thinking || state.turn !== "X") return;
      if (state.meta[b] !== null) return;
      if (state.mini[b][c] !== null) return;
      if (state.active !== null && state.active !== b) return;
      setState((cur) => applyMove(cur, [b, c]));
      setHistory((h) => [...h, { who: "X", move: [b, c], nodes: 0, ms: 0, score: 0 }]);
    }

    function reset() {
      setState(initialState());
      setHistory([]);
      setStats({ nodes: 0, score: 0, ms: 0 });
    }

    const status = thinking ? "AI thinking…"
      : metaWin?.who === "O" ? "AI takes the meta-board. Try again."

            </span>
            <button onClick={reset} style={{
              appearance: "none", border: `1px solid ${theme.line}`,
              background: "transparent", color: theme.text,
              padding: "4px 10px", borderRadius: 999,
              fontFamily: "'JetBrains Mono', ui-monospace, monospace",

          </div>

          {/* 3x3 meta-grid of 3x3 mini-boards */}
          <div className="scc-minimax-board" style={{
            display: "grid",
            gridTemplateColumns: "repeat(3, 1fr)",
            gap: 8,

          }}>
            {state.mini.map((mini, idx) => (
              <MiniBoard
                key={idx}
                idx={idx}
                mini={mini}
                winner={state.meta[idx]}
                theme={theme}
                accent={accent}
                isActive={!gameOver && (state.active === idx || (state.active === null && state.meta[idx] === null && !isFull(mini)))}
                canPlay={canPlayBoard(idx)}
                onCell={play}
                lastMove={lastMove}
              />
            ))}
          </div>

          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            paddingTop: 4,
          }}>
            <span style={{ fontSize: 13, color: theme.text }}>{status}</span>
            <span style={{
              fontFamily: "'JetBrains Mono', ui-monospace, monospace",
              fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase",
              color: theme.dim,
            }}>You: X · AI: O</span>
          </div>
        </div>

        {/* Right column: pitch + telemetry */}
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <div>
            <span style={{
              fontFamily: "'JetBrains Mono', ui-monospace, monospace",
              fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase",
              color: accent,
            }}>▸ Live demo · Tikto King</span>
            <h3 style={{
              margin: "10px 0 0",
              fontSize: "clamp(28px, 3.6vw, 48px)", fontWeight: 600,
              letterSpacing: "-0.025em", lineHeight: 1.0, color: theme.text,
            }}>
              Beat the AI<br />
              <span style={{ color: accent }}>I built</span>.
            </h3>
            <p style={{
              margin: "14px 0 0", fontSize: 14, lineHeight: 1.55,
              color: theme.dim, maxWidth: 520, textWrap: "pretty",
            }}>
              <span style={{ color: theme.text }}>Ultimate Tic-Tac-Toe.</span> Your move inside a small board sends the AI to a specific small board. Win three small boards in a row to win the meta-game. Game tree is ~10⁴⁰ states — too big for perfect play, so the AI runs depth-4 minimax with α-β pruning and a positional heuristic. Beating it requires actual strategy.
            </p>
          </div>

          {/* Telemetry */}
          <div style={{
            background: theme.panel, border: `1px solid ${theme.line}`,
            borderRadius: 12, padding: 14,
            display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16,
          }}>
            {[
              { k: "Nodes evaluated", v: stats.nodes ? stats.nodes.toLocaleString() : "—", sub: "depth-4 with α-β" },
              { k: "Search time", v: stats.ms ? `${stats.ms.toFixed(0)}ms` : "—", sub: "single-threaded" },
              { k: "Eval score", v: stats.score === 0 ? "—" : (stats.score > 0 ? `+${stats.score}` : `${stats.score}`), sub: "AI's favor →" },
            ].map(({ k, v, sub }) => (
              <div key={k}>
                <div style={{
                  fontFamily: "'JetBrains Mono', ui-monospace, monospace",
                  fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase",

                }}>{k}</div>
                <div style={{
                  marginTop: 4, fontSize: 22, fontWeight: 600,
                  color: theme.text, letterSpacing: "-0.01em",
                  fontVariantNumeric: "tabular-nums",
                }}>{v}</div>
                <div style={{
                  marginTop: 2,
                  fontFamily: "'JetBrains Mono', ui-monospace, monospace",
                  fontSize: 9, letterSpacing: "0.12em",
                  color: theme.veryDim,
                }}>{sub}</div>
              </div>
            ))}
          </div>

          {/* Move log */}
          <div style={{
            background: theme.panel, border: `1px solid ${theme.line}`,
            borderRadius: 12, padding: 14, flex: 1, minHeight: 0,
            display: "flex", flexDirection: "column", gap: 8,
          }}>
            <div style={{
              fontFamily: "'JetBrains Mono', ui-monospace, monospace",
              fontSize: 9, letterSpacing: "0.16em", textTransform: "uppercase",
              color: theme.dim,
              display: "flex", justifyContent: "space-between",

              <span>console.log</span>
              <span>{history.length} moves</span>
            </div>
            <div style={{
              maxHeight: 140, overflowY: "auto",

            </div>
          </div>
        </div>
      </div>
    );
  }

  window.MinimaxDemo = MinimaxDemo;
})();

  </script>

  <script type="text/babel">
// arcade.jsx — Simplified 3D CSS arcade cabinet housing the Minimax demo.
// Just marquee + CRT screen + slim base. No joystick or button cluster —
// less crowded, more focus on the playable demo inside.

(function() {
  const { useState, useEffect, useRef } = React;

  function ArcadeCabinet({ theme, accent, children }) {
    const wrapRef = useRef(null);
    const [tilt, setTilt] = useState({ x: 0, y: 0 });
    const isMobile = typeof window !== "undefined" && window.matchMedia("(max-width: 880px)").matches;

    // Subtle parallax tilt on mouse move — adds the "this is 3D" cue without
    // being nauseating. Desktop only.
    useEffect(() => {
      if (isMobile) return;
      const el = wrapRef.current;
      if (!el) return;
      const onMove = (e) => {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = (e.clientX - cx) / r.width;
        const dy = (e.clientY - cy) / r.height;
        setTilt({ x: Math.max(-4, Math.min(4, -dy * 3)), y: Math.max(-4, Math.min(4, dx * 3)) });
      };
      const onLeave = () => setTilt({ x: 0, y: 0 });
      window.addEventListener("mousemove", onMove);
      el.addEventListener("mouseleave", onLeave);
      return () => {
        window.removeEventListener("mousemove", onMove);
        el.removeEventListener("mouseleave", onLeave);
      };
    }, [isMobile]);

    // Blink cursor on marquee
    const [blink, setBlink] = useState(true);
    useEffect(() => {
      const t = setInterval(() => setBlink((b) => !b), 600);
      return () => clearInterval(t);
    }, []);

    const wood = "linear-gradient(180deg, #1a1612 0%, #100d0a 100%)";

    return (
      <div ref={wrapRef} style={{
        perspective: 1800,
        perspectiveOrigin: "center 30%",
        width: "100%",
      }}>
        <div style={{
          maxWidth: 1080,
          margin: "0 auto",
          transformStyle: "preserve-3d",
          transform: isMobile ? "none" : `rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)`,
          transition: "transform 0.25s ease-out",
        }}>
          {/* MARQUEE */}
          <div style={{
            position: "relative",
            background: wood,
            borderTopLeftRadius: 24,
            borderTopRightRadius: 24,
            padding: isMobile ? "16px 18px" : "20px 28px",
            borderBottom: `1px solid ${accent}33`,
            display: "flex", alignItems: "center", justifyContent: "space-between",
            boxShadow: `inset 0 -1px 0 ${accent}22, inset 0 1px 0 rgba(255,255,255,.08)`,
          }}>
            <div style={{
              position: "absolute", inset: 4,
              borderRadius: 20,
              background: `radial-gradient(60% 80% at 50% 50%, ${accent}28, transparent 70%)`,
              pointerEvents: "none",
            }} />
            <span style={{
              position: "relative",
              fontFamily: "'JetBrains Mono', ui-monospace, monospace",
              fontSize: isMobile ? 14 : 22,
              fontWeight: 700, letterSpacing: "0.32em",
              color: accent,
              textShadow: `0 0 14px ${accent}aa, 0 0 30px ${accent}55`,
            }}>
              SAIF<span style={{ opacity: blink ? 1 : 0.4 }}>.</span>EXE
            </span>
            <span style={{
              position: "relative",
              fontFamily: "'JetBrains Mono', ui-monospace, monospace",
              fontSize: isMobile ? 9 : 11, letterSpacing: "0.18em",
              color: `${accent}aa`,
              display: isMobile ? "none" : "block",
            }}>
              ★ INSERT COIN · PRESS START ★
            </span>
          </div>

          {/* CABINET BODY — just screen now */}
          <div style={{
            position: "relative",
            background: wood,
            padding: isMobile ? "14px" : "24px 32px 28px",
          }}>
            {/* SCREEN BEZEL */}
            <div style={{
              position: "relative",
              background: "#0a0907",
              borderRadius: isMobile ? 12 : 16,
              padding: isMobile ? 10 : 16,
              boxShadow: `
                inset 0 0 0 1px rgba(255,255,255,.04),
                inset 0 2px 8px rgba(0,0,0,.6),
                0 16px 40px rgba(0,0,0,.5)
              `,
            }}>
              {/* Power LED + channel — desktop only */}
              {!isMobile && (
                <React.Fragment>
                  <div style={{
                    position: "absolute", left: 18, top: 10,
                    display: "flex", alignItems: "center", gap: 8,
                  }}>
                    <span style={{
                      width: 7, height: 7, borderRadius: 999, background: accent,
                      boxShadow: `0 0 8px ${accent}, 0 0 14px ${accent}99`,
                      animation: "scc-pulse 2.4s ease-in-out infinite",
                    }} />
                    <span style={{
                      fontFamily: "'JetBrains Mono', ui-monospace, monospace",
                      fontSize: 9, letterSpacing: "0.18em", color: "#fff4",
                    }}>PWR</span>
                  </div>
                  <div style={{
                    position: "absolute", right: 18, top: 10,
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 9, letterSpacing: "0.18em", color: "#fff4",
                  }}>CH-01 · 60Hz</div>
                </React.Fragment>
              )}

              {/* SCREEN — content lives here */}
              <div style={{
                position: "relative",
                background: theme.bg,
                borderRadius: isMobile ? 8 : 10,
                padding: isMobile ? 18 : 28,
                marginTop: isMobile ? 0 : 12,
                overflow: "hidden",
                boxShadow: "inset 0 0 60px rgba(0,0,0,.4)",
              }}>
                {/* CRT scanlines */}
                <div style={{
                  position: "absolute", inset: 0,
                  background: "repeating-linear-gradient(180deg, rgba(0,0,0,.06) 0 1px, transparent 1px 3px)",
                  pointerEvents: "none",

                  borderRadius: isMobile ? 8 : 10,
                }} />
                {/* Vignette */}
                <div style={{
                  position: "absolute", inset: 0,

                  pointerEvents: "none",

                <div style={{ position: "relative", zIndex: 1 }}>{children}</div>
              </div>

          {/* SLIM BASE */}
          <div style={{
            position: "relative",
            background: "linear-gradient(180deg, #0d0a07 0%, #050403 100%)",
            borderBottomLeftRadius: 14,
            borderBottomRightRadius: 14,
            padding: isMobile ? "10px 16px" : "12px 28px",
            display: "flex", justifyContent: "space-between", alignItems: "center",
            boxShadow: "0 30px 60px rgba(0,0,0,.5)",
          }}>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: isMobile ? 9 : 10, letterSpacing: "0.18em",
              color: "#fff3",
            }}>▸ MODEL TKK-001</span>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: isMobile ? 9 : 10, letterSpacing: "0.18em",
              color: `${accent}66`,
            }}>EST · TUNIS · 2020</span>
          </div>
        </div>
      </div>
    );
  }

  window.ArcadeCabinet = ArcadeCabinet;
})();

  </script>

  <script type="text/babel">
// casestudy.jsx — Full-screen modal overlay that renders a project case study.
// Closed by clicking the backdrop, the close button, or pressing Escape.
// Locks body scroll while open.

(function() {
  const { useEffect, useRef } = React;

  function CaseStudyModal({ project, theme, accent, onClose }) {
    const cs = (window.CASE_STUDIES || {})[project?.title];
    const dialogRef = useRef(null);

    // Lock body scroll while open
    useEffect(() => {
      const prevOverflow = document.body.style.overflow;
      const prevPaddingRight = document.body.style.paddingRight;
      const scrollbarW = window.innerWidth - document.documentElement.clientWidth;
      document.body.style.overflow = "hidden";
      if (scrollbarW > 0) document.body.style.paddingRight = `${scrollbarW}px`;
      return () => {
        document.body.style.overflow = prevOverflow;
        document.body.style.paddingRight = prevPaddingRight;
      };

    useEffect(() => {
      const onKey = (e) => { if (e.key === "Escape") onClose(); };

// ─── Scroll progress bar ───────────────────────────────────────────────────

function ScrollProgress({ accent }) {
  const barRef = useRef(null);
  useEffect(() => {
    let raf;
    const update = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const p = max > 0 ? Math.max(0, Math.min(1, window.scrollY / max)) : 0;
      if (barRef.current) barRef.current.style.transform = `scaleX(${p})`;
    };
    const onScroll = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(update); };
    update();
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("resize", onScroll);
      cancelAnimationFrame(raf);
    };
  }, []);
  return (
    <div aria-hidden="true" style={{
      position: "fixed", top: 0, left: 0, right: 0,
      height: 3, zIndex: 60, pointerEvents: "none",
      background: "rgba(255,255,255,0.04)",

  );

// ─── App ───────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "themeName": "dark-warm",
  "accentIdx": 0,
  "showBoot": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme  = THEMES[t.themeName]  || THEMES["dark-warm"];
  const accentList = ACCENTS[t.themeName] || ACCENTS["dark-warm"];
  const accent = accentList[t.accentIdx]  || accentList[0];

  const [openCase, setOpenCase] = useState(null);

  const [bootDone, setBootDone] = useState(() => {
    if (!t.showBoot) return true;
    try { return localStorage.getItem("scc.bootSeen") === "1"; } catch (e) { return false; }
  });

  useEffect(() => {
    document.body.style.background = theme.bg;
    document.body.style.color = theme.text;
  }, [theme]);

  return (
    <div style={{
      minHeight: "100vh", background: theme.bg, color: theme.text,
      fontFamily: "'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif",
      fontFeatureSettings: "'ss01', 'ss02'",
    }}>
      {!bootDone && <BootScreen accent={accent} onDismiss={() => setBootDone(true)} />}

      <ScrollProgress accent={accent} />
      <Nav    theme={theme} accent={accent} />
      <Hero   theme={theme} accent={accent} />
      <Work   theme={theme} accent={accent} onOpenCaseStudy={setOpenCase} />
      <ArcadeSection theme={theme} accent={accent} />
      <Career theme={theme} accent={accent} />
      <Skills theme={theme} accent={accent} />
      <Contact theme={theme} accent={accent} />
      <Footer  theme={theme} />

      {openCase && CaseStudyModal && (
        <CaseStudyModal project={openCase} theme={theme} accent={accent} onClose={() => setOpenCase(null)} />
      )}

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Palette" value={t.themeName}
          options={[
            { value: "dark-warm", label: "Warm" },
            { value: "dark-cool", label: "Cool" },
            { value: "paper",     label: "Paper" },
          ]}
          onChange={v => setTweak({ themeName: v, accentIdx: 0 })} />
        <TweakColor label="Accent" value={accent} options={accentList}
          onChange={v => setTweak("accentIdx", accentList.indexOf(v))} />

        <TweakSection label="Boot screen" />
        <TweakToggle label="Show on next visit" value={t.showBoot}
          onChange={v => {
            setTweak("showBoot", v);
            try {
              if (v) localStorage.removeItem("scc.bootSeen");
              else localStorage.setItem("scc.bootSeen", "1");
            } catch (e) {}
          }} />
        <TweakButton label="Replay boot screen"
          onClick={() => {
            try { localStorage.removeItem("scc.bootSeen"); } catch (e) {}
            setBootDone(false);
          }} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
